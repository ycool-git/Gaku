<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>小5 毎日ドリル</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@700&display=swap');
:root{
  --primary:#1a3a5c;--accent:#e8a020;--green:#3a9e6e;--red:#c0392b;
  --bg:#f0ece4;--card:#fff;--rule:#d0c8bc;--sub:#777;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);min-height:100vh;color:#222;}

/* ヘッダー */
.app-header{background:var(--primary);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.3);}
.app-title{font-family:'Kaisei Decol',serif;color:var(--accent);font-size:1.1rem;flex:1;min-width:120px;}
.app-header input[type="date"]{padding:6px 8px;border-radius:8px;border:none;font-family:inherit;font-size:.85rem;background:rgba(255,255,255,.15);color:#fff;cursor:pointer;}
.app-header input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);}

/* ツールバー */
.toolbar-wrap{background:#edeae4;border-bottom:1px solid var(--rule);padding:8px 16px;}
.toolbar{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.tool-label{font-size:.78rem;color:var(--sub);font-weight:700;flex-shrink:0;}
.tool-btn{padding:8px 16px;border-radius:20px;border:2px solid var(--rule);font-family:inherit;font-weight:700;font-size:.85rem;cursor:pointer;background:#fff;color:#555;transition:all .15s;flex-shrink:0;}
.tool-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.tool-btn.eraser-active{background:#7b5c3a;color:#fff;border-color:#7b5c3a;}
.color-palette{display:flex;align-items:center;gap:8px;}
.color-swatch{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.25);}
.color-swatch.active{border-color:#333;transform:scale(1.2);}
.color-swatch.c-navy{background:#1a3a5c;}.color-swatch.c-red{background:#d32f2f;}.color-swatch.c-blue{background:#1565c0;}

/* ⑥ペンの太さ3段階ボタン */
.size-btns{display:flex;align-items:center;gap:6px;}
.size-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--rule);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.size-btn.active{border-color:var(--primary);background:#e8f0fc;}
.size-dot-s{width:5px;height:5px;border-radius:50%;background:#333;display:block;}
.size-dot-m{width:9px;height:9px;border-radius:50%;background:#333;display:block;}
.size-dot-l{width:14px;height:14px;border-radius:50%;background:#333;display:block;}

.pencil-status{font-size:.72rem;color:var(--sub);background:#fff;border-radius:12px;padding:4px 12px;border:1px solid var(--rule);margin-left:auto;}

/* ボタン */
.btn{padding:9px 18px;border-radius:12px;border:none;font-family:inherit;font-weight:700;font-size:.88rem;cursor:pointer;transition:transform .1s;white-space:nowrap;}
.btn:active{transform:scale(.95);}
.btn-gen{background:var(--accent);color:var(--primary);}
.btn-ans{background:var(--green);color:#fff;}
.btn-review{background:var(--accent);color:var(--primary);}
.btn-end-review{background:var(--primary);color:#fff;}

/* スクロールボタン */
.scroll-up-btn,.scroll-dn-btn{position:fixed;right:0;z-index:300;width:52px;height:80px;background:var(--primary);color:#fff;border:none;font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:-2px 0 8px rgba(0,0,0,.2);border-radius:12px 0 0 12px;opacity:.88;user-select:none;}
.scroll-up-btn{top:calc(50% - 90px);}
.scroll-dn-btn{top:calc(50% + 10px);}
.scroll-up-btn:active,.scroll-dn-btn:active{opacity:1;}

/* タブ */
.tabs{display:flex;max-width:900px;margin:14px auto 0;padding:0 16px;gap:8px;}
.tab{flex:1;padding:12px;border-radius:12px 12px 0 0;border:none;font-family:inherit;font-weight:700;font-size:1rem;cursor:pointer;background:rgba(255,255,255,.4);color:var(--sub);transition:background .2s,color .2s;}
.tab.active{background:var(--card);color:var(--primary);}

/* コンテンツ */
.content{max-width:900px;margin:0 auto;padding:0 16px 80px;}
.panel{display:none;}.panel.active{display:block;}
.card{background:var(--card);border-radius:0 0 16px 16px;padding:18px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:16px;}
.sec-label{font-size:.78rem;font-weight:700;color:#fff;background:var(--primary);display:inline-block;padding:4px 14px;border-radius:20px;margin-bottom:16px;letter-spacing:.05em;}
.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;font-size:.88em;line-height:1.15;margin:0 2px;}
.frac-n{border-bottom:1.5px solid currentColor;padding:0 4px 1px;}.frac-d{padding:1px 4px 0;}

/* 結果バー */
.result-bar{background:var(--primary);color:#fff;border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
.result-date{font-size:.82rem;opacity:.75;}
.cheer-msg{font-family:'Kaisei Decol',serif;color:var(--accent);font-size:1rem;flex:1;text-align:center;}
.score-disp{font-family:'Kaisei Decol',serif;font-size:1.4rem;}
.score-disp em{color:var(--accent);font-style:normal;}

/* ○× */
.self-score{display:flex;gap:8px;}
.sc-o,.sc-x{width:48px;height:48px;border-radius:50%;border:3px solid var(--rule);font-size:1.3rem;font-weight:700;cursor:pointer;background:#f5f5f5;color:#ccc;display:flex;align-items:center;justify-content:center;transition:all .18s;user-select:none;flex-shrink:0;}
.sc-o.on{background:#e0f4ea;color:var(--green);border-color:var(--green);transform:scale(1.1);}
.sc-x.on{background:#fde8e8;color:var(--red);border-color:var(--red);transform:scale(1.1);}

/* ⑧計算カード：2列グリッド */
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:600px){.calc-grid{grid-template-columns:1fr;}}

.calc-card{border:1.5px solid var(--rule);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;}
.calc-top{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fafaf8;border-bottom:1px dashed var(--rule);flex-wrap:wrap;position:relative;}
.calc-num-badge{width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;font-size:.78rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.calc-question{font-size:1rem;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.equals{color:var(--sub);margin:0 3px;}
.ans-canvas-wrap{position:relative;flex-shrink:0;}
.ans-canvas{width:80px;height:80px;border:2.5px solid var(--primary);border-radius:8px;background:#fff;touch-action:none;cursor:crosshair;display:block;}
.ans-clear-btn{position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;background:#bbb;border:none;cursor:pointer;font-size:.65rem;color:#fff;display:flex;align-items:center;justify-content:center;}
.ans-clear-btn:active{background:var(--red);}
.calc-answer-reveal{display:none;font-weight:700;color:var(--red);font-size:.95rem;flex-shrink:0;}
body.show-answers .calc-answer-reveal{display:block;}

/* ③右上に○× */
.calc-score-wrap{position:absolute;top:8px;right:8px;display:flex;gap:6px;}

/* 筆算エリア：縦に広く */
.calc-scratch-wrap{padding:8px 10px;background:#fff;flex:1;}
.scratch-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.scratch-label{font-size:.68rem;color:var(--sub);}
.scratch-clear-btn{background:none;border:1px solid var(--rule);border-radius:6px;padding:3px 8px;font-size:.68rem;color:var(--sub);cursor:pointer;}
.scratch-canvas{width:100%;height:200px;border:1px solid #eee;border-radius:6px;background:#fffef8;touch-action:none;cursor:crosshair;display:block;}

/* ===== 漢字 ===== */
.kanji-list{display:flex;flex-direction:column;gap:18px;}

/* ③右上に○× */
.kanji-item{padding:16px;background:#fafaf8;border-radius:14px;border:2px solid var(--rule);position:relative;}
.kanji-score-wrap{position:absolute;top:12px;right:12px;display:flex;gap:6px;}

.kanji-num-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-right:120px;}
.kanji-num{font-size:.82rem;color:#fff;background:var(--primary);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}

/* ヒント */
.kanji-hint{font-size:.95rem;color:#555;background:#fff3d4;border:1.5px solid var(--accent);border-radius:10px;padding:5px 12px;font-weight:500;display:inline-block;}

/* ② 例文テキスト形式（マスなし） */
.kanji-sentence{
  font-size:1.35rem;
  line-height:1.9;
  margin:10px 0 14px;
  color:#222;
}
/* 答え部分を太字・色付き */
.kanji-keyword{
  font-weight:700;
  color:var(--primary);
  font-size:1.35rem;
}
/* ふりがな */
.kanji-keyword ruby rt{font-size:0.55rem;color:var(--sub);}

/* ④ 書き込みマス：中央揃え */
.kanji-boxes{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
.kanji-box-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.kanji-canvas{width:120px;height:120px;border:2px solid var(--rule);border-radius:8px;background:#fff;touch-action:none;cursor:crosshair;display:block;}
.kanji-char-label{font-size:.72rem;color:#aaa;}
.zoom-btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:.82rem;cursor:pointer;font-family:inherit;font-weight:700;margin-top:4px;}
.zoom-btn:active{background:#2a5a8c;}

.kanji-item-footer{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:4px;}
.kanji-answer-area{display:none;align-items:center;gap:8px;}
body.show-answers .kanji-answer-area{display:flex;}
.kanji-answer-label{font-size:.9rem;color:var(--sub);font-weight:700;}
.kanji-answer-text{font-family:'Noto Serif JP',serif;font-weight:700;font-size:2.4rem;color:var(--red);letter-spacing:6px;}
.erase-all-btn{background:#fff;border:2px solid var(--rule);border-radius:10px;padding:10px 20px;font-size:.9rem;font-weight:700;color:var(--sub);cursor:pointer;margin-left:auto;font-family:inherit;}
.erase-all-btn:active{background:#eee;}

/* ===== 復習パネル ===== */
#reviewSection{display:none;}
.review-header-bar{background:var(--accent);color:var(--primary);border-radius:14px 14px 0 0;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.review-header-title{font-family:'Kaisei Decol',serif;font-size:1.1rem;font-weight:700;flex:1;}
.review-body{background:var(--card);border-radius:0 0 16px 16px;padding:0;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:16px;overflow:hidden;}

/* 復習アイテム：左練習＋右お手本 */
.review-item{display:flex;border-bottom:2px solid var(--bg);}
.review-item:last-child{border-bottom:none;}
.review-left{flex:1;padding:18px;min-width:0;}
.review-reading-big{font-size:1.2rem;font-weight:700;color:var(--primary);margin-bottom:4px;}
.review-sentence-small{font-size:.88rem;color:var(--sub);margin-bottom:12px;line-height:1.8;}
.review-rounds{display:flex;flex-direction:column;gap:14px;}
.review-round{border:1px solid var(--rule);border-radius:10px;padding:12px;}
.review-round-label{font-size:.82rem;font-weight:700;color:var(--sub);margin-bottom:8px;}
.review-boxes{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
.review-erase-btn{background:none;border:1px solid var(--rule);border-radius:8px;padding:5px 14px;font-size:.78rem;color:var(--sub);cursor:pointer;}

/* 右：お手本（大きく・sticky） */
.review-right{
  width:180px;flex-shrink:0;
  background:#f3f0ea;border-left:2px solid var(--rule);
  padding:16px 10px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  position:sticky;top:120px;align-self:flex-start;
}
.review-right-title{font-size:.8rem;font-weight:700;color:var(--sub);}
.review-model-chars{display:flex;flex-direction:column;gap:8px;align-items:center;}
.review-model-char{
  font-family:'Noto Serif JP',serif;
  font-size:4.5rem;color:var(--primary);line-height:1;
  width:120px;height:120px;
  display:flex;align-items:center;justify-content:center;
  background:#fff;border:2px solid var(--rule);border-radius:10px;
}

/* ズームモーダル */
.zoom-modal{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);align-items:center;justify-content:center;}
.zoom-modal.open{display:flex;}
.zoom-modal-inner{background:#fff;border-radius:18px;padding:22px;max-width:95vw;max-height:95vh;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 8px 40px rgba(0,0,0,.4);}
.zoom-modal-title{font-size:1.1rem;font-weight:700;color:var(--primary);}
.zoom-modal-canvas{border:2px solid var(--rule);border-radius:10px;background:#fff;touch-action:none;cursor:crosshair;}
.zoom-modal-footer{display:flex;gap:10px;}
.zoom-close-btn{padding:10px 22px;border-radius:10px;border:none;background:var(--primary);color:#fff;font-weight:700;cursor:pointer;font-family:inherit;}
.zoom-clear-btn{padding:10px 22px;border-radius:10px;border:none;background:#eee;color:#555;font-weight:700;cursor:pointer;font-family:inherit;}
.zoom-done-btn{padding:10px 22px;border-radius:10px;border:none;background:var(--green);color:#fff;font-weight:700;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">📚 小5 毎日ドリル</div>
  <input type="date" id="dateInput">
  <button class="btn btn-gen" onclick="generate()">🎲 新しい問題</button>
  <button class="btn btn-ans" id="ansBtn" onclick="toggleAnswers()">✅ 答えを見る</button>
</div>

<div class="toolbar-wrap">
  <div class="toolbar">
    <span class="tool-label">ツール：</span>
    <button class="tool-btn active" id="btnPen"    onclick="setTool('pen')">✏️ ペン</button>
    <button class="tool-btn"        id="btnEraser" onclick="setTool('eraser')">🧹 消しゴム</button>
    <span class="tool-label" style="margin-left:4px">色：</span>
    <div class="color-palette">
      <div class="color-swatch c-navy active" id="sw-navy" onclick="setColor('#1a3a5c','navy')"></div>
      <div class="color-swatch c-red"         id="sw-red"  onclick="setColor('#d32f2f','red')"></div>
      <div class="color-swatch c-blue"        id="sw-blue" onclick="setColor('#1565c0','blue')"></div>
    </div>
    <!-- ⑥太さ3段階 -->
    <span class="tool-label" style="margin-left:4px">太さ：</span>
    <div class="size-btns">
      <button class="size-btn" id="sz-s" onclick="setPenSize('s')" title="細い"><span class="size-dot-s"></span></button>
      <button class="size-btn active" id="sz-m" onclick="setPenSize('m')" title="中"><span class="size-dot-m"></span></button>
      <button class="size-btn" id="sz-l" onclick="setPenSize('l')" title="太い"><span class="size-dot-l"></span></button>
    </div>
    <div class="pencil-status" id="pencilStatus">Apple Pencil: 未検出</div>
  </div>
</div>

<button class="scroll-up-btn" id="scrollUpBtn">▲</button>
<button class="scroll-dn-btn" id="scrollDnBtn">▼</button>

<div class="tabs">
  <button class="tab active" onclick="switchTab('calc')">🔢 計算（12問）</button>
  <button class="tab"        onclick="switchTab('kanji')">✍️ 漢字（10問）</button>
</div>

<div class="content">

  <!-- 計算パネル -->
  <div class="panel active" id="panel-calc">
    <div class="card">
      <div class="sec-label">計算 ― 答えを書いて筆算しよう！🔥</div>
      <!-- ⑧2列グリッド -->
      <div class="calc-grid" id="calcList"></div>
    </div>
    <div class="result-bar">
      <div class="result-date" id="dispDate">―</div>
      <div class="cheer-msg"   id="cheerMsg">「新しい問題」を押してスタート！</div>
      <div class="score-disp"  id="calcScore" style="display:none"></div>
    </div>
  </div>

  <!-- 漢字パネル -->
  <div class="panel" id="panel-kanji">

    <!-- テスト画面 -->
    <div id="testSection">
      <div class="card">
        <div class="sec-label">漢字 ― 例文を読んで□にあたる漢字を書こう！🌟</div>
        <div class="kanji-list" id="kanjiList"></div>
      </div>
      <div class="result-bar">
        <div class="cheer-msg" style="font-family:inherit;font-size:.9rem;text-align:left">
          全部書いたら「✅ 答えを見る」→ ○か×をつけよう！
        </div>
        <div class="score-disp" id="kanjiScore" style="display:none"></div>
        <button class="btn btn-review" id="reviewBtn" style="display:none" onclick="startReview()">🔁 復習する</button>
      </div>
    </div>

    <!-- 復習画面 -->
    <div id="reviewSection">
      <div class="review-header-bar">
        <div class="review-header-title">🔁 復習タイム！まちがえた漢字を3回ずつ書いてマスターしよう💪</div>
        <button class="btn btn-end-review" onclick="endReview()">✅ 復習おわり！テストにもどる</button>
      </div>
      <div class="review-body">
        <div id="reviewList"></div>
      </div>
    </div>

  </div>
</div>

<!-- ズームモーダル -->
<div class="zoom-modal" id="zoomModal">
  <div class="zoom-modal-inner">
    <div class="zoom-modal-title" id="zoomTitle">🔍 拡大して書く</div>
    <canvas class="zoom-modal-canvas" id="zoomCanvas"></canvas>
    <div class="zoom-modal-footer">
      <button class="zoom-clear-btn" onclick="zoomClear()">🧹 消す</button>
      <button class="zoom-done-btn"  onclick="zoomDone()">✅ 完了</button>
      <button class="zoom-close-btn" onclick="zoomClose()">✕ 閉じる</button>
    </div>
  </div>
</div>

<script>
// ===== ⑤⑥ペンサイズ3段階（デフォルトM=8） =====
const PEN_SIZES = { s:4, m:8, l:14 };
let tool='pen', penColor='#1a3a5c', penSize=8, pencilConnected=false;

function setTool(t){
  tool=t;
  document.getElementById('btnPen').className   ='tool-btn'+(t==='pen'?    ' active':'');
  document.getElementById('btnEraser').className='tool-btn'+(t==='eraser'?' eraser-active':'');
}
function setColor(hex,name){
  penColor=hex; if(tool!=='pen') setTool('pen');
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
  document.getElementById('sw-'+name).classList.add('active');
}
function setPenSize(sz){
  penSize=PEN_SIZES[sz];
  document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sz-'+sz).classList.add('active');
}

document.addEventListener('pointerdown',e=>{
  if(e.pointerType==='pen'){
    if(!pencilConnected){ pencilConnected=true; const el=document.getElementById('pencilStatus'); el.textContent='🍎 Apple Pencil 接続中'; el.style.color='#3a9e6e'; }
    if(e.button===1){ e.preventDefault(); setTool(tool==='pen'?'eraser':'pen'); }
  }
},{passive:false});

// ===== スクロール =====
function setupScrollBtn(id,dir){
  const btn=document.getElementById(id); let timer=null;
  const step=()=>window.scrollBy({top:dir*120,behavior:'auto'});
  const start=(e)=>{e.preventDefault();step();timer=setInterval(step,80);};
  const stop=()=>{clearInterval(timer);timer=null;};
  btn.addEventListener('pointerdown',start,{passive:false});
  btn.addEventListener('pointerup',stop); btn.addEventListener('pointerleave',stop);
  btn.addEventListener('contextmenu',e=>e.preventDefault());
}
setupScrollBtn('scrollUpBtn',-1); setupScrollBtn('scrollDnBtn',1);

// ===== 乱数 =====
function seededRand(seed){ let s=seed; return ()=>{ s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/4294967296; }; }
function getDateSeed(str){ return str.split('-').join('')|0; }
function ri(min,max,r){ return Math.floor(r()*(max-min+1))+min; }
function gcd(a,b){ return b===0?a:gcd(b,a%b); }
function shuffle(arr,r){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// ===== 計算生成 =====
function generateCalcProblems(rand){
  const types=shuffle([0,0,1,1,2,2,3,3,4,4,5,6],rand);
  const gen=[
    ()=>{ const a=ri(12,99,rand),b=ri(2,9,rand); return {q:`${a} × ${b}`,a:`${a*b}`}; },
    ()=>{ const b=ri(2,9,rand),a=b*ri(2,15,rand); return {q:`${a} ÷ ${b}`,a:`${a/b}`}; },
    ()=>{ const a=+(ri(1,9,rand)+'.'+ri(1,9,rand)),b=+(ri(1,9,rand)+'.'+ri(1,9,rand)); return {q:`${a} ＋ ${b}`,a:`${+((a+b).toFixed(2))}`}; },
    ()=>{ const b=+(ri(1,8,rand)+'.'+ri(1,9,rand)),big=+(ri((b|0)+1,9,rand)+'.'+ri(0,9,rand)),sm=Math.min(big,b); return {q:`${Math.max(big,b)} － ${sm}`,a:`${+((Math.max(big,b)-sm).toFixed(2))}`}; },
    ()=>{ const d=ri(3,9,rand),n1=ri(1,d-1,rand),n2=ri(1,d-1,rand),sum=n1+n2,g=gcd(sum,d); return {q:`${n1}/${d} ＋ ${n2}/${d}`,a:sum===d?'1':(g>1?`${sum/g}/${d/g}`:`${sum}/${d}`)}; },
    ()=>{ const d=ri(3,9,rand),n1=ri(2,d,rand),n2=ri(1,n1-1,rand),diff=n1-n2,g=gcd(diff,d); return {q:`${n1}/${d} － ${n2}/${d}`,a:g>1?`${diff/g}/${d/g}`:`${diff}/${d}`}; },
    ()=>{ const a=ri(4,20,rand),b=ri(3,15,rand); return {q:`${a}×${b}cm の面積`,a:`${a*b}cm²`}; },
  ];
  return Array.from({length:12},(_,i)=>gen[types[i]%gen.length]());
}

}

// sentence配列からHTMLを生成
function buildSentenceHtml(sentArr, answer){
  const chars=[...answer];
  return sentArr.map(part=>{
    if(Array.isArray(part)){
      // キーワード部分：ふりがな＋太字
      return chars.map((c,i)=>`<ruby>${c}<rt>${part[i]||''}</rt></ruby>`).join('');
    } else {
      return part;
    }
  }).join('');
}

// ===== キャンバス =====
function drawGuides(canvas){
  const ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height;
  ctx.save(); ctx.strokeStyle='#ddd'; ctx.lineWidth=Math.max(1,w/100); ctx.setLineDash([6,6]);
  ctx.beginPath();ctx.moveTo(w/2,0);ctx.lineTo(w/2,h);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,h/2);ctx.lineTo(w,h/2);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}
function setupCanvas(canvas,opts){
  const ctx=canvas.getContext('2d'); ctx.lineCap='round'; ctx.lineJoin='round';
  if(opts&&opts.guides) drawGuides(canvas);
  canvas.style.touchAction='none';
  let drawing=false,last=null;
  function getPos(e){ const r=canvas.getBoundingClientRect(); return {x:(e.clientX-r.left)*(canvas.width/r.width),y:(e.clientY-r.top)*(canvas.height/r.height)}; }
  function onDown(e){ if(e.isPrimary===false) return; e.preventDefault(); e.stopPropagation(); canvas.setPointerCapture(e.pointerId); drawing=true; last=getPos(e); }
  function onMove(e){
    if(!drawing||e.isPrimary===false) return; e.preventDefault(); e.stopPropagation();
    const p=getPos(e); ctx.save();
    if(tool==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.strokeStyle='rgba(0,0,0,1)';ctx.lineWidth=penSize*4;}
    else{ctx.globalCompositeOperation='source-over';ctx.strokeStyle=penColor;const pr=(e.pressure>0)?e.pressure+0.5:1;ctx.lineWidth=penSize*pr;}
    ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();ctx.restore();
    if(opts&&opts.guides&&tool==='eraser') drawGuides(canvas);
    last=p;
  }
  function onUp(e){ e.preventDefault(); drawing=false; last=null; }
  canvas.addEventListener('pointerdown',onDown,{passive:false});
  canvas.addEventListener('pointermove',onMove,{passive:false});
  canvas.addEventListener('pointerup',onUp,{passive:false});
  canvas.addEventListener('pointercancel',onUp,{passive:false});
  canvas.addEventListener('touchstart',e=>{ if(e.touches.length===1) e.preventDefault(); },{passive:false});
  canvas.addEventListener('touchmove', e=>{ if(e.touches.length===1) e.preventDefault(); },{passive:false});
}
function clearCanvas(c,guides){ c.getContext('2d').clearRect(0,0,c.width,c.height); if(guides) drawGuides(c); }
function makeKanjiCanvas(){ const c=document.createElement('canvas'); c.className='kanji-canvas'; c.width=240; c.height=240; return c; }

// ===== ズームモーダル =====
let zoomSrc=null, zoomGuides=false;
function openZoom(src,label,guides){
  zoomSrc=src; zoomGuides=guides;
  const zc=document.getElementById('zoomCanvas');
  document.getElementById('zoomTitle').textContent=`🔍 ${label}（拡大）`;
  const sz=Math.min(window.innerWidth-60, window.innerHeight-220, 340);
  zc.width=sz; zc.height=sz; zc.style.width=sz+'px'; zc.style.height=sz+'px';
  const ctx=zc.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,sz,sz); ctx.drawImage(src,0,0,sz,sz);
  if(guides) drawGuides(zc);
  document.getElementById('zoomModal').classList.add('open');
  setupCanvas(zc,{guides});
}
function zoomDone(){
  if(zoomSrc){ const ctx=zoomSrc.getContext('2d'); ctx.clearRect(0,0,zoomSrc.width,zoomSrc.height); ctx.drawImage(document.getElementById('zoomCanvas'),0,0,zoomSrc.width,zoomSrc.height); if(zoomGuides) drawGuides(zoomSrc); }
  zoomClose();
}
function zoomClear(){ clearCanvas(document.getElementById('zoomCanvas'),zoomGuides); }
function zoomClose(){ document.getElementById('zoomModal').classList.remove('open'); zoomSrc=null; }
document.getElementById('zoomModal').addEventListener('pointerdown',e=>{ if(e.target===document.getElementById('zoomModal')) zoomClose(); });

let currentKanji=[];

    const chars=[...k.answer];

      if(Array.isArray(part)){
        // 答え部分：ふりがなのみ・大きめ・オレンジ（漢字・□は一切表示しない）

      <!-- ④ 書き込みマス（中央揃え） -->
      <div class="kanji-boxes"></div>
      <div class="kanji-item-footer">
        <div class="kanji-answer-area">
          <span class="kanji-answer-label">正解：</span>
          <div class="kanji-answer-text">${k.answer}</div>
        </div>
        <button class="erase-all-btn">🧹 全消し</button>
      </div>`;
    list.appendChild(item);

    const boxesEl=item.querySelector('.kanji-boxes');
    chars.forEach((_,ci)=>{

      const canvas=makeKanjiCanvas();
      const lbl=document.createElement('div'); lbl.className='kanji-char-label'; lbl.textContent=`${ci+1}文字目`;

    });
    item.querySelector('.erase-all-btn').onclick=()=>

// ===== 復習機能 =====
function startReview(){
  const wrongs=kanjiScores.map((v,i)=>v==='x'?i:-1).filter(i=>i>=0);
  if(wrongs.length===0) return;

  document.getElementById('testSection').style.display='none';
  document.getElementById('reviewSection').style.display='';

  const list=document.getElementById('reviewList');
  list.innerHTML='';

  // canvasのsetupを後でまとめて行うためのリスト
  const pendingSetup=[];

  wrongs.forEach(idx=>{
    const k=currentKanji[idx];
    const chars=[...k.answer];

    let sentText='';
    k.sentence.forEach(part=>{
      if(Array.isArray(part)) sentText+=k.answer;
      else sentText+=part;
    });

    const item=document.createElement('div');
    item.className='review-item';
    list.appendChild(item);

    const left=document.createElement('div');
    left.className='review-left';
    left.innerHTML=`
      <div class="review-reading-big">「${k.answer}」を練習しよう！</div>
      <div class="review-sentence-small">📖 ${sentText}</div>
      <div class="review-rounds"></div>`;
    item.appendChild(left);

    const right=document.createElement('div');
    right.className='review-right';
    right.innerHTML=`<div class="review-right-title">📖 お手本</div><div class="review-model-chars">${
      chars.map(ch=>`<div class="review-model-char">${ch}</div>`).join('')
    }</div>`;
    item.appendChild(right);

    const roundsEl=left.querySelector('.review-rounds');
    for(let r=0;r<3;r++){
      const rd=document.createElement('div');
      rd.className='review-round';
      rd.innerHTML=`<div class="review-round-label">${['1回目','2回目','3回目'][r]}</div><div class="review-boxes"></div><button class="review-erase-btn">🧹 消す</button>`;
      roundsEl.appendChild(rd);
      const boxes=rd.querySelector('.review-boxes');
      const canvases=[];
      chars.forEach((_,ci)=>{
        const wrap=document.createElement('div'); wrap.className='kanji-box-wrap';
        const c=makeKanjiCanvas();
        const lbl=document.createElement('div'); lbl.className='kanji-char-label'; lbl.textContent=`${ci+1}文字目`;
        const zBtn=document.createElement('button'); zBtn.className='zoom-btn'; zBtn.textContent='🔍 ズーム';
        zBtn.onclick=((_c,_r)=>()=>openZoom(_c,`${k.answer} ${_r+1}回目`,true))(c,r);
        wrap.appendChild(c); wrap.appendChild(lbl); wrap.appendChild(zBtn);
        boxes.appendChild(wrap);
        // ★ setup は後でrAFで行う
        pendingSetup.push(c);
        canvases.push(c);
      });
      rd.querySelector('.review-erase-btn').onclick=()=>canvases.forEach(c=>clearCanvas(c,true));
    }
  });

  // ★ レイアウト確定後にsetupCanvas（2フレーム待つ）
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      pendingSetup.forEach(c=>setupCanvas(c,{guides:true}));
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });
}

}
