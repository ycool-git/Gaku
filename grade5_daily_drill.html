<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>小5 毎日ドリル</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@700&display=swap');
:root{--primary:#1a3a5c;--accent:#e8a020;--green:#3a9e6e;--red:#c0392b;--bg:#f0ece4;--card:#fff;--rule:#d0c8bc;--sub:#777;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);min-height:100vh;color:#222;}

/* ヘッダー */
.app-header{background:var(--primary);padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.3);}
.app-title{font-family:'Kaisei Decol',serif;color:var(--accent);font-size:1.1rem;flex:1;min-width:80px;}
.app-header input[type="date"]{padding:6px 8px;border-radius:8px;border:none;font-family:inherit;font-size:.82rem;background:rgba(255,255,255,.15);color:#fff;cursor:pointer;}
.app-header input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);}
.hdr-btn{padding:7px 14px;border-radius:10px;border:2px solid rgba(255,255,255,.35);font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;background:rgba(255,255,255,.15);color:#fff;white-space:nowrap;}
.hdr-btn.off{opacity:.5;}

/* ツールバー */
.toolbar-wrap{background:#edeae4;border-bottom:1px solid var(--rule);padding:8px 16px;}
.toolbar{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.tool-label{font-size:.78rem;color:var(--sub);font-weight:700;flex-shrink:0;}
.tool-btn{padding:8px 16px;border-radius:20px;border:2px solid var(--rule);font-family:inherit;font-weight:700;font-size:.85rem;cursor:pointer;background:#fff;color:#555;transition:all .15s;flex-shrink:0;}
.tool-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.tool-btn.eraser-active{background:#7b5c3a;color:#fff;border-color:#7b5c3a;}
.color-palette{display:flex;align-items:center;gap:8px;}
.color-swatch{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.25);}
.color-swatch.active{border-color:#333;transform:scale(1.2);}
.color-swatch.c-navy{background:#1a3a5c;}.color-swatch.c-red{background:#d32f2f;}.color-swatch.c-blue{background:#1565c0;}
.size-btns{display:flex;align-items:center;gap:6px;}
.size-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--rule);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.size-btn.active{border-color:var(--primary);background:#e8f0fc;}
.sd-s{width:5px;height:5px;border-radius:50%;background:#333;display:block;}
.sd-m{width:9px;height:9px;border-radius:50%;background:#333;display:block;}
.sd-l{width:14px;height:14px;border-radius:50%;background:#333;display:block;}
.pencil-status{font-size:.72rem;color:var(--sub);background:#fff;border-radius:12px;padding:4px 12px;border:1px solid var(--rule);margin-left:auto;}

/* ボタン */
.btn{padding:9px 18px;border-radius:12px;border:none;font-family:inherit;font-weight:700;font-size:.88rem;cursor:pointer;transition:transform .1s;white-space:nowrap;}
.btn:active{transform:scale(.95);}
.btn-gen{background:var(--accent);color:var(--primary);}
.btn-ans{background:var(--green);color:#fff;}
.btn-review{background:var(--accent);color:var(--primary);}
.btn-end{background:var(--primary);color:#fff;}

/* タブ */
.tabs{display:flex;max-width:900px;margin:14px auto 0;padding:0 16px;gap:8px;}
.tab{flex:1;padding:12px;border-radius:12px 12px 0 0;border:none;font-family:inherit;font-weight:700;font-size:1rem;cursor:pointer;background:rgba(255,255,255,.4);color:var(--sub);transition:background .2s,color .2s;}
.tab.active{background:var(--card);color:var(--primary);}

/* コンテンツ */
.content{max-width:900px;margin:0 auto;padding:0 16px 80px;}
.panel{display:none;}.panel.active{display:block;}
.card{background:var(--card);border-radius:0 0 16px 16px;padding:18px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:16px;}
.sec-label{font-size:.78rem;font-weight:700;color:#fff;background:var(--primary);display:inline-block;padding:4px 14px;border-radius:20px;margin-bottom:16px;letter-spacing:.05em;}
.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;font-size:.88em;line-height:1.15;margin:0 2px;}
.frac-n{border-bottom:1.5px solid currentColor;padding:0 4px 1px;}.frac-d{padding:1px 4px 0;}

/* 結果バー */
.result-bar{background:var(--primary);color:#fff;border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
.cheer-msg{font-family:'Kaisei Decol',serif;color:var(--accent);font-size:1rem;flex:1;text-align:center;}
.score-disp{font-family:'Kaisei Decol',serif;font-size:1.4rem;}
.score-disp em{color:var(--accent);font-style:normal;}

/* ○× */
.sc-o,.sc-x{width:48px;height:48px;border-radius:50%;border:3px solid var(--rule);font-size:1.3rem;font-weight:700;cursor:pointer;background:#f5f5f5;color:#ccc;display:flex;align-items:center;justify-content:center;transition:all .18s;user-select:none;flex-shrink:0;}
.sc-o.on{background:#e0f4ea;color:var(--green);border-color:var(--green);transform:scale(1.1);}
.sc-x.on{background:#fde8e8;color:var(--red);border-color:var(--red);transform:scale(1.1);}

/* ===== 計算 2列グリッド ===== */
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.calc-card{border:1.5px solid var(--rule);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;}
.calc-top{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fafaf8;border-bottom:1px dashed var(--rule);flex-wrap:nowrap;}
.calc-num-badge{width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;font-size:.78rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.calc-question{font-size:1rem;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.equals{color:var(--sub);margin:0 3px;}
.ans-canvas-wrap{position:relative;flex:0 0 110px;}
.ans-canvas{width:110px;height:56px;border:2.5px solid var(--primary);border-radius:8px;background:#fff;touch-action:none;cursor:crosshair;display:block;}
.ans-clear-btn{position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;background:#bbb;border:none;cursor:pointer;font-size:.65rem;color:#fff;display:flex;align-items:center;justify-content:center;z-index:1;}
.ans-clear-btn:active{background:var(--red);}
.calc-answer-reveal{display:none;font-weight:700;color:var(--red);font-size:.95rem;flex-shrink:0;white-space:nowrap;}
body.show-answers .calc-answer-reveal{display:block;}
.calc-score-row{display:none;align-items:center;justify-content:flex-end;gap:8px;padding:6px 12px;background:#fafaf8;border-bottom:1px dashed var(--rule);}
body.show-answers .calc-score-row{display:flex;}
.calc-scratch-wrap{padding:8px 10px;background:#fff;flex:1;}
.scratch-label{font-size:.68rem;color:var(--sub);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.scratch-clear-btn{background:none;border:1px solid var(--rule);border-radius:6px;padding:2px 8px;font-size:.68rem;color:var(--sub);cursor:pointer;}
.scratch-canvas{width:100%;height:200px;border:1px solid #eee;border-radius:6px;background:#fffef8;touch-action:none;cursor:crosshair;display:block;}

/* ===== 漢字 ===== */
.kanji-list{display:flex;flex-direction:column;gap:18px;}
.kanji-item{padding:16px;background:#fafaf8;border-radius:14px;border:2px solid var(--rule);}
.kanji-score-wrap{display:none;gap:6px;justify-content:flex-end;margin-bottom:8px;}
body.show-answers .kanji-score-wrap{display:flex;}
.kanji-num-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.kanji-num{font-size:.82rem;color:#fff;background:var(--primary);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
.kanji-hint{font-size:.95rem;color:#555;background:#fff3d4;border:1.5px solid var(--accent);border-radius:10px;padding:5px 12px;font-weight:500;display:inline-block;}
.kanji-sentence{font-size:1.25rem;line-height:2;margin:10px 0 14px;color:#222;}
.kanji-ruby{font-size:1.4rem;font-weight:700;color:var(--accent);}
.kanji-boxes{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
.kanji-char-set{display:flex;flex-direction:column;align-items:center;gap:4px;}
.kanji-ans-char{font-family:'Noto Serif JP',serif;font-size:5rem;color:var(--primary);width:140px;height:140px;display:none;align-items:center;justify-content:center;background:#fff;border:2px solid var(--accent);border-radius:10px;}
body.show-answers .kanji-ans-char{display:flex;}
/* 漢字canvas：2レイヤー */
.kanji-canvas-pair{position:relative;width:120px;height:120px;border:2px solid var(--rule);border-radius:8px;background:#fff;overflow:hidden;display:block;flex-shrink:0;}
.kanji-bg-canvas{position:absolute;top:0;left:0;width:120px;height:120px;pointer-events:none;}
.kanji-fg-canvas{position:absolute;top:0;left:0;width:120px;height:120px;touch-action:none;cursor:crosshair;}
.kanji-char-label{font-size:.72rem;color:#aaa;}
/* 漢字エリアのツールバー */
.kanji-tool-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.kanji-tool-btn{padding:6px 14px;border-radius:20px;border:2px solid var(--rule);font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;background:#fff;color:#555;transition:all .15s;}
.kanji-tool-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.kanji-tool-btn.eraser{background:#7b5c3a;color:#fff;border-color:#7b5c3a;}
.zoom-btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:.82rem;cursor:pointer;font-family:inherit;font-weight:700;margin-top:4px;}
.zoom-btn:active{background:#2a5a8c;}
.kanji-item-footer{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:4px;}

/* ===== 復習パネル ===== */
.review-header-bar{background:var(--accent);color:var(--primary);border-radius:14px 14px 0 0;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.review-header-title{font-family:'Kaisei Decol',serif;font-size:1.05rem;font-weight:700;flex:1;}
.review-body{background:var(--card);border-radius:0 0 16px 16px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:16px;overflow:hidden;}
.review-item{padding:18px;border-bottom:2px solid var(--bg);}
.review-item:last-child{border-bottom:none;}
.review-reading-big{font-size:1.2rem;font-weight:700;color:var(--primary);margin-bottom:4px;}
.review-sentence-small{font-size:.88rem;color:var(--sub);margin-bottom:14px;line-height:1.8;}
.review-rounds{display:flex;flex-direction:column;gap:14px;}
.review-round{border:1px solid var(--rule);border-radius:10px;padding:12px;}
.review-round-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.review-round-label{font-size:.82rem;font-weight:700;color:var(--sub);}
.review-erase-btn{background:none;border:1px solid var(--rule);border-radius:8px;padding:5px 14px;font-size:.78rem;color:var(--sub);cursor:pointer;}
.review-boxes{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:6px;justify-content:center;}
.review-char-set{display:flex;flex-direction:column;align-items:center;gap:4px;}
.review-model-char{font-family:'Noto Serif JP',serif;font-size:5rem;color:var(--primary);width:140px;height:140px;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid var(--accent);border-radius:10px;}

/* ズームモーダル */
.zoom-modal{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);align-items:center;justify-content:center;}
.zoom-modal.open{display:flex;}
.zoom-modal-inner{background:#fff;border-radius:18px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px;box-shadow:0 8px 40px rgba(0,0,0,.4);}
.zoom-modal-title{font-size:1rem;font-weight:700;color:var(--primary);}
/* ★ ズームのbg/fgを正しく重ねる */
.zoom-canvas-pair{position:relative;border:2px solid var(--rule);border-radius:10px;overflow:hidden;background:#fff;}
.zoom-bg-canvas{position:absolute;top:0;left:0;pointer-events:none;}
.zoom-fg-canvas{position:relative;display:block;touch-action:none;cursor:crosshair;background:transparent;}
.zoom-modal-footer{display:flex;gap:10px;}
.zoom-clear-btn,.zoom-done-btn,.zoom-close-btn{padding:10px 22px;border-radius:10px;border:none;font-weight:700;cursor:pointer;font-family:inherit;}
.zoom-clear-btn{background:#eee;color:#555;}
.zoom-done-btn{background:var(--green);color:#fff;}
.zoom-close-btn{background:var(--primary);color:#fff;}

/* 音設定モーダル */
.sound-modal{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.6);align-items:center;justify-content:center;}
.sound-modal.open{display:flex;}
.sound-modal-inner{background:#fff;border-radius:18px;padding:24px;width:90%;max-width:440px;box-shadow:0 8px 40px rgba(0,0,0,.3);}
.sound-row{margin-bottom:18px;}
.sound-row-title{font-size:.88rem;font-weight:700;color:#444;margin-bottom:8px;}
.sound-file-label{display:inline-flex;align-items:center;gap:10px;cursor:pointer;padding:8px 14px;border:2px solid var(--rule);border-radius:10px;background:#fafaf8;}
.sound-file-label span.btn-txt{background:var(--primary);color:#fff;padding:5px 12px;border-radius:7px;font-size:.8rem;font-weight:700;}
.sound-file-name{font-size:.78rem;color:#888;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">📚 小5 毎日ドリル</div>
  <input type="date" id="dateInput">
  <button class="btn btn-gen" onclick="generate()">🎲 新しい問題</button>
  <button class="btn btn-ans" id="ansBtn" onclick="toggleAnswers()">✅ 答えを見る</button>
  <button class="hdr-btn" id="muteBtn" onclick="toggleMute()">音ON</button>
  <button class="hdr-btn" onclick="openSoundModal()">🎵 音設定</button>
</div>

<div class="toolbar-wrap">
  <div class="toolbar">
    <span class="tool-label">ツール：</span>
    <button class="tool-btn active" id="btnPen"    onclick="setTool('pen')">✏️ ペン</button>
    <button class="tool-btn"        id="btnEraser" onclick="setTool('eraser')">🧹 消しゴム</button>
    <span class="tool-label" style="margin-left:4px">色：</span>
    <div class="color-palette">
      <div class="color-swatch c-navy active" id="sw-navy" onclick="setColor('#1a3a5c','navy')"></div>
      <div class="color-swatch c-red"         id="sw-red"  onclick="setColor('#d32f2f','red')"></div>
      <div class="color-swatch c-blue"        id="sw-blue" onclick="setColor('#1565c0','blue')"></div>
    </div>
    <span class="tool-label" style="margin-left:4px">太さ：</span>
    <div class="size-btns">
      <button class="size-btn"        id="sz-s" onclick="setPenSize('s')"><span class="sd-s"></span></button>
      <button class="size-btn active" id="sz-m" onclick="setPenSize('m')"><span class="sd-m"></span></button>
      <button class="size-btn"        id="sz-l" onclick="setPenSize('l')"><span class="sd-l"></span></button>
    </div>
    <div class="pencil-status" id="pencilStatus">Apple Pencil: 未検出</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('calc')">🔢 計算（12問）</button>
  <button class="tab"        onclick="switchTab('kanji')">✍️ 漢字（10問）</button>
</div>

<div class="content">
  <div class="panel active" id="panel-calc">
    <div class="card">
      <div class="sec-label">計算 ― 答えを書いて計算スペースで筆算しよう！🔥</div>
      <div class="calc-grid" id="calcList"></div>
    </div>
    <div class="result-bar">
      <div style="font-size:.82rem;opacity:.75" id="dispDate">―</div>
      <div class="cheer-msg" id="cheerMsg">「新しい問題」を押してスタート！</div>
      <div class="score-disp" id="calcScore" style="display:none"></div>
    </div>
  </div>

  <div class="panel" id="panel-kanji">
    <div id="testSection">
      <div class="card">
        <div class="sec-label">漢字 ― 例文の□にあたる漢字を書こう！🌟</div>
        <div class="kanji-list" id="kanjiList"></div>
      </div>
      <div class="result-bar">
        <div class="cheer-msg" style="font-family:inherit;font-size:.9rem;text-align:left">全部書いたら「✅ 答えを見る」→ ○か×をつけよう！</div>
        <div class="score-disp" id="kanjiScore" style="display:none"></div>
        <button class="btn btn-review" id="reviewBtn" style="display:none" onclick="startReview()">🔁 復習する</button>
      </div>
    </div>
    <div id="reviewSection" style="display:none">
      <div class="review-header-bar">
        <div class="review-header-title">🔁 まちがえた漢字を3回ずつ書いてマスターしよう💪</div>
        <button class="btn btn-end" onclick="endReview()">✅ 復習おわり！テストにもどる</button>
      </div>
      <div class="review-body"><div id="reviewList"></div></div>
    </div>
  </div>
</div>

<!-- 音設定モーダル -->
<div class="sound-modal" id="soundModal">
  <div class="sound-modal-inner">
    <div style="font-size:1.1rem;font-weight:700;color:var(--primary);margin-bottom:20px;">🎵 音の設定</div>
    <div class="sound-row">
      <div class="sound-row-title">○ 正解の音（mp3/wav）</div>
      <label class="sound-file-label">
        <span class="btn-txt">ファイルを選択</span>
        <span class="sound-file-name" id="fname-correct">未設定（デフォルト：ピンポン）</span>
        <input type="file" accept="audio/mpeg,audio/wav,audio/mp3,audio/ogg,audio/*" style="display:none" onchange="loadSound(this,'correct')">
      </label>
    </div>
    <div class="sound-row">
      <div class="sound-row-title">× 不正解の音（mp3/wav）</div>
      <label class="sound-file-label">
        <span class="btn-txt">ファイルを選択</span>
        <span class="sound-file-name" id="fname-wrong">未設定（デフォルト：チャイム）</span>
        <input type="file" accept="audio/mpeg,audio/wav,audio/mp3,audio/ogg,audio/*" style="display:none" onchange="loadSound(this,'wrong')">
      </label>
    </div>
    <button onclick="closeSoundModal()" style="width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-family:inherit;font-weight:700;font-size:.95rem;cursor:pointer;margin-top:6px;">✅ 閉じる</button>
  </div>
</div>

<!-- ズームモーダル -->
<div class="zoom-modal" id="zoomModal">
  <div class="zoom-modal-inner" id="zoomInner">
    <div class="zoom-modal-title" id="zoomTitle">🔍 拡大して書く</div>
    <!-- ★ bgが下・fgが上で重なる -->
    <div class="zoom-canvas-pair" id="zoomPair">
      <canvas class="zoom-bg-canvas" id="zoomBg"></canvas>
      <canvas class="zoom-fg-canvas" id="zoomFg"></canvas>
    </div>
    <div class="zoom-modal-footer">
      <button class="zoom-clear-btn" onclick="zoomClear()">🧹 消す</button>
      <button class="zoom-done-btn"  onclick="zoomDone()">✅ 完了</button>
      <button class="zoom-close-btn" onclick="zoomClose()">✕ 閉じる</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ===== 音声（インポートのみ） =====
var muted = false;
var sounds = { write: null, correct: null, wrong: null };
var writeTimer = null;

function loadSound(input, key) {
  var file = input.files[0];
  if (!file) return;
  var url = URL.createObjectURL(file);
  sounds[key] = url;
  document.getElementById('fname-'+key).textContent = file.name;
}

function playSound(key) {
  if (muted || !sounds[key]) return;
  try {
    var a = new Audio(sounds[key]);
    a.volume = 0.85;
    a.play().catch(function(){});
  } catch(e){}
}

// デフォルト音（Web Audio API）
var actx = null;
function getActx(){ if(!actx){ try{ actx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return actx; }
function tone(f,d,v){ var c=getActx(); if(!c) return; try{ var o=c.createOscillator(),g=c.createGain(); o.frequency.value=f; g.gain.setValueAtTime(v||0.25,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d); o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+d); }catch(e){} }

function playCorrectSound() {
  if (muted) return;
  if (sounds.correct) { playSound('correct'); return; }
  tone(880,0.1,0.28); setTimeout(function(){ tone(1108,0.15,0.28); },90);
}
function playWrongSound() {
  if (muted) return;
  if (sounds.wrong) { playSound('wrong'); return; }

// ===== 乱数 =====
function seededRand(seed){ var s=seed; return function(){ s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/4294967296; }; }
function getDateSeed(str){ return parseInt(str.split('-').join(''),10); }
function ri(min,max,r){ return Math.floor(r()*(max-min+1))+min; }
function gcd(a,b){ return b===0?a:gcd(b,a%b); }
function shuffle(arr,r){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){var j=Math.floor(r()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }

// ===== 計算生成 =====
function generateCalcProblems(rand){
  var types=shuffle([0,0,1,1,2,2,3,3,4,4,5,6],rand);
  var gen=[
    function(){var a=ri(12,99,rand),b=ri(2,9,rand);return{q:a+' × '+b,a:''+a*b};},
    function(){var b=ri(2,9,rand),a=b*ri(2,15,rand);return{q:a+' ÷ '+b,a:''+a/b};},
    function(){var a=+(ri(1,9,rand)+'.'+ri(1,9,rand)),b=+(ri(1,9,rand)+'.'+ri(1,9,rand));return{q:a+' ＋ '+b,a:''+((a+b).toFixed(2)*1)};},
    function(){var b=+(ri(1,8,rand)+'.'+ri(1,9,rand)),big=+(ri((b|0)+1,9,rand)+'.'+ri(0,9,rand)),sm=Math.min(big,b);return{q:Math.max(big,b)+' － '+sm,a:''+(Math.max(big,b)-sm).toFixed(2)*1};},
    function(){var d=ri(3,9,rand),n1=ri(1,d-1,rand),n2=ri(1,d-1,rand),sum=n1+n2,g=gcd(sum,d);return{q:n1+'/'+d+' ＋ '+n2+'/'+d,a:sum===d?'1':g>1?(sum/g)+'/'+(d/g):sum+'/'+d};},
    function(){var d=ri(3,9,rand),n1=ri(2,d,rand),n2=ri(1,n1-1,rand),df=n1-n2,g=gcd(df,d);return{q:n1+'/'+d+' － '+n2+'/'+d,a:g>1?(df/g)+'/'+(d/g):df+'/'+d};},
    function(){var a=ri(4,20,rand),b=ri(3,15,rand);return{q:a+'×'+b+'cm の面積',a:a*b+'cm²'};}
  ];
  return Array.from({length:12},function(_,i){return gen[types[i]%gen.length]();});
}

// ===== キャンバス（補助線レイヤー分離）=====
function drawGuidesOn(bg){
  var ctx=bg.getContext('2d'),w=bg.width,h=bg.height;
  ctx.clearRect(0,0,w,h);
  ctx.save(); ctx.strokeStyle='#ccc'; ctx.lineWidth=Math.max(1,w/100); ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(w/2,0);ctx.lineTo(w/2,h);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,h/2);ctx.lineTo(w,h/2);ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}

function setupCanvas(fg, opts){
  var ctx=fg.getContext('2d');
  ctx.lineCap='round'; ctx.lineJoin='round';
  fg.style.touchAction='none';
  var drawing=false, last=null;
  var penOnly=opts&&opts.penOnly;

  function getPos(e){
    var r=fg.getBoundingClientRect();
    return {x:(e.clientX-r.left)*(fg.width/r.width),y:(e.clientY-r.top)*(fg.height/r.height)};
  }
  function onDown(e){
    if(e.isPrimary===false) return;
    if(penOnly&&e.pointerType!=='pen') return;
    e.preventDefault(); e.stopPropagation();
    if(fg.setPointerCapture) fg.setPointerCapture(e.pointerId);
    drawing=true; last=getPos(e);
  }
  function onMove(e){
    if(!drawing||e.isPrimary===false) return;
    if(penOnly&&e.pointerType!=='pen') return;
    e.preventDefault(); e.stopPropagation();
    var p=getPos(e); ctx.save();
    if(tool==='eraser'){
      ctx.globalCompositeOperation='destination-out'; ctx.strokeStyle='rgba(0,0,0,1)'; ctx.lineWidth=penSize*4;
    } else {
      ctx.globalCompositeOperation='source-over'; ctx.strokeStyle=penColor;
      ctx.lineWidth=penSize*((e.pressure>0)?e.pressure+0.5:1);
    }
    ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();ctx.restore();
    last=p;
  }
  function onUp(e){e.preventDefault();drawing=false;last=null;}
  fg.addEventListener('pointerdown',onDown,{passive:false});
  fg.addEventListener('pointermove',onMove,{passive:false});
  fg.addEventListener('pointerup',onUp,{passive:false});
  fg.addEventListener('pointercancel',onUp,{passive:false});
  fg.addEventListener('touchstart',function(e){if(e.touches.length===1)e.preventDefault();},{passive:false});
  fg.addEventListener('touchmove',function(e){if(e.touches.length===1)e.preventDefault();},{passive:false});
}

function clearFg(fg){fg.getContext('2d').clearRect(0,0,fg.width,fg.height);}

      fg.addEventListener('pointermove',function(e){

  document.getElementById('testSection').style.display='none';
  document.getElementById('reviewSection').style.display='';
  var list=document.getElementById('reviewList'); list.innerHTML='';

  wrongs.forEach(function(idx){
    var k=currentKanji[idx], chars=k.answer.split('');
    var readings=[];
    k.sentence.forEach(function(p){if(Array.isArray(p))readings=readings.concat(p);});

    var item=document.createElement('div'); item.className='review-item';
    item.innerHTML=
      '<div class="review-reading-big">「'+k.answer+'」を練習しよう！</div>'+
      '<div class="review-sentence-small">📖 '+buildSentenceText(k)+'</div>'+
      '<div class="review-rounds"></div>';
    list.appendChild(item);
    var roundsEl=item.querySelector('.review-rounds');

    for(var r=0;r<3;r++){
      var rd=document.createElement('div'); rd.className='review-round';
      rd.innerHTML=
        '<div class="review-round-header">'+
          '<div class="review-round-label">'+(r+1)+'回目</div>'+
          '<button class="review-erase-btn">🧹 消す</button>'+
        '</div>'+
        '<div class="review-boxes"></div>';
      roundsEl.appendChild(rd);

      var boxes=rd.querySelector('.review-boxes'), fgList=[];
      chars.forEach(function(ch,ci){
        var reading=readings[ci]||'';
        var set=document.createElement('div'); set.className='review-char-set';
        var modelChar=document.createElement('div'); modelChar.className='review-model-char'; modelChar.textContent=ch;
        var kp=makeKanjiPair();
        var zBtn=document.createElement('button'); zBtn.className='zoom-btn'; zBtn.textContent='🔍 ズーム';
        (function(fg,r2,rd2){zBtn.onclick=function(){openZoom(fg,reading||readings.join(''));};})(kp.fg,r,rd);
        set.appendChild(modelChar); set.appendChild(kp.pair); set.appendChild(zBtn);
        boxes.appendChild(set); fgList.push(kp.fg);
      });
      (function(fgs){rd.querySelector('.review-erase-btn').onclick=function(){fgs.forEach(function(fg){clearFg(fg);});};})(fgList);
    }
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

function endReview(){
  document.getElementById('reviewSection').style.display='none';
  document.getElementById('testSection').style.display='';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ===== 生成 =====
function generate(){
  var dateStr=document.getElementById('dateInput').value||today();
  document.getElementById('dateInput').value=dateStr;
  var parts=dateStr.split('-');
  document.getElementById('dispDate').textContent=parts[0]+'年'+parts[1]+'月'+parts[2]+'日';
  var rand=seededRand(getDateSeed(dateStr));
  renderCalc(generateCalcProblems(rand));
  renderKanji(shuffle(kanjiDB.slice(),rand).slice(0,10));
  document.getElementById('cheerMsg').textContent=cheers[Math.floor(rand()*cheers.length)];
  answersOn=false;
  document.body.classList.remove('show-answers');
  document.getElementById('ansBtn').textContent='✅ 答えを見る';
  document.getElementById('calcScore').style.display='none';
  document.getElementById('kanjiScore').style.display='none';
  document.getElementById('reviewBtn').style.display='none';
  document.getElementById('testSection').style.display='';
  document.getElementById('reviewSection').style.display='none';
  setTool('pen'); setColor('#1a3a5c','navy');
}
function today(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

document.getElementById('dateInput').value=today();
generate();
</script>
